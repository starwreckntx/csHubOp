name: Production Deployment
on:
  push:
    branches: [ "main" ]
  issue_comment:
    types: [created]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '/deploy-staging')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Staging Environment
        run: |
          # VULNERABILITY: Direct injection of untrusted comment body into bash
          echo "DEPLOY_CMD=./scripts/deploy.sh --env ${{ github.event.comment.body }}" >> $GITHUB_ENV
          
      - name: Execute Deployment
        run: |
          ${{ env.DEPLOY_CMD }}
